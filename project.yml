name: GridPulse
options:
  bundleIdPrefix: com.ef-engineering
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
    DEVELOPMENT_TEAM: Z2PN67EL4F
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  GridPulse:
    type: application
    platform: iOS
    sources:
      - path: GridPulse-iOS
        excludes:
          - "**/.DS_Store"
    resources:
      - path: GridPulse-iOS/Resources/Assets.xcassets
      - path: GridPulse-iOS/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ef-engineering.gridpulse
        INFOPLIST_FILE: GridPulse-iOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      configs:
        Debug:
          INFOPLIST_KEY_NSAppTransportSecurity: '{"NSAllowsArbitraryLoads":false,"NSAllowsLocalNetworking":true,"NSExceptionDomains":{"api.jolpica-f1.com":{"NSExceptionAllowsInsecureHTTPLoads":true,"NSIncludesSubdomains":true},"openf1.org":{"NSExceptionAllowsInsecureHTTPLoads":true,"NSIncludesSubdomains":true},"ergast.com":{"NSExceptionAllowsInsecureHTTPLoads":true,"NSIncludesSubdomains":true}}}'
        Release:
          INFOPLIST_KEY_NSAppTransportSecurity: '{"NSAllowsArbitraryLoads":false,"NSAllowsLocalNetworking":false}'
    entitlements:
      path: GridPulse-iOS/Resources/GridPulse.entitlements
      properties:
        com.apple.developer.swift-data: true

  GridPulse-Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GridPulse-Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: GridPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ef-engineering.gridpulse.tests
        GENERATE_INFOPLIST_FILE: YES