# SwiftLint Configuration - GridPulse
# Sensible rules for SwiftUI project

disabled_rules:
  - trailing_whitespace
  - line_length
  - force_cast
  - force_try
  - type_body_length
  - file_length
  - function_body_length
  - large_tuple

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - first_where
  - last_where
  - redundant_nil_coalescing
  - sorted_first_last
  - unowned_variable_capture

excluded:
  - .build
  - DerivedData
  - GridPulse-Tests
  - ci_scripts

identifier_name:
  min_length: 2
  max_length: 60

type_name:
  min_length: 3
  max_length: 60

nesting:
  type_level:
    warning: 3
    error: 5

cyclomatic_complexity:
  warning: 15
  error: 25

mark: 
  stricter: false